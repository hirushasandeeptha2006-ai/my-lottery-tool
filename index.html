<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SL Lottery Hub - ලොතරැයි ප්‍රතිඵල</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-blue-600 p-4 text-white shadow-lg mb-8">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">SL Lottery Hub</h1>
            <span class="text-sm opacity-80">Daily Updates</span>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4">
        <div class="bg-white p-6 rounded-xl shadow-sm mb-8 flex flex-col md:flex-row gap-4">
            <input type="text" id="searchInput" placeholder="ලොතරැයි නම ගහන්න (उदा: Mahajana...)" 
                class="flex-1 p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <select id="filterType" class="p-3 border rounded-lg bg-gray-50">
                <option value="all">සියල්ල</option>
                <option value="numbers">අංක පමණක්</option>
            </select>
        </div>

        <div id="results-container" class="grid gap-6 md:grid-cols-2">
            <div class="col-span-full text-center py-10">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mx-auto"></div>
                <p class="mt-4 text-gray-500">දත්ත පූරණය වෙමින් පවතී...</p>
            </div>
        </div>
    </div>

    <script>
        let allResults = [];

        async function loadResults() {
            try {
                const response = await fetch('results.json?v=' + Date.now());
                allResults = await response.json();
                displayResults(allResults);
            } catch (err) {
                document.getElementById('results-container').innerHTML = 
                    `<p class="col-span-full text-center text-red-500 bg-red-100 p-4 rounded-lg">තාම දත්ත update වෙලා නැහැ. කරුණාකර Actions run කරන්න.</p>`;
            }
        }

        function displayResults(data) {
            const container = document.getElementById('results-container');
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = '<p class="col-span-full text-center text-gray-400">කිසිදු ප්‍රතිඵලයක් හමු නොවීය.</p>';
                return;
            }

            data.forEach(lottery => {
                const card = `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
                        <div class="flex justify-between items-start mb-4">
                            <h2 class="text-xl font-bold text-gray-800">${lottery.name}</h2>
                            <span class="text-xs font-bold bg-green-100 text-green-700 px-2 py-1 rounded">නවතම</span>
                        </div>
                        <p class="text-sm text-gray-400 mb-4 font-medium">දිනුම් ඇදීම: ${lottery.date}</p>
                        <div class="flex flex-wrap gap-3">
                            ${lottery.numbers.map(num => `
                                <div class="w-12 h-12 flex items-center justify-center bg-gradient-to-br from-blue-500 to-blue-700 text-white font-bold rounded-full shadow-sm text-lg">
                                    ${num}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        // Search Logic
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = allResults.filter(l => l.name.toLowerCase().includes(searchTerm));
            displayResults(filtered);
        });

        loadResults();
    </script>
</body>
</html>
