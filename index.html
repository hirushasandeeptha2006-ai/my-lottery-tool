<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sri Lanka Lottery Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-5">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold text-center text-blue-700 mb-8">Lotto Sri Lanka - අද ප්‍රතිඵල</h1>
        
        <div id="results-container" class="space-y-4">
            <p class="text-center">Results loading...</p>
        </div>
    </div>

    <script>
        // GitHub එකේ තියෙන results.json file එක කියවනවා
        fetch('results.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('results-container');
                container.innerHTML = '';
                
                data.forEach(lottery => {
                    const card = `
                        <div class="bg-white p-5 rounded-lg shadow-md border-l-4 border-blue-500">
                            <h2 class="text-xl font-semibold text-gray-800">${lottery.name}</h2>
                            <p class="text-sm text-gray-500 mb-3">දිනය: ${lottery.date}</p>
                            <div class="flex flex-wrap gap-2">
                                ${lottery.numbers.map(num => `
                                    <span class="w-10 h-10 flex items-center justify-center bg-blue-100 text-blue-700 font-bold rounded-full border border-blue-300">
                                        ${num}
                                    </span>
                                `).join('')}
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            })
            .catch(err => {
                document.getElementById('results-container').innerHTML = '<p class="text-red-500 text-center">තාම results update වෙලා නැහැ. කරුණාකර Actions run කරලා ඉන්න.</p>';
            });
    </script>
</body>
</html>
