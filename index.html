<!DOCTYPE html>
<html>
<head>
    <title>SL Lottery</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <h1 class="text-2xl font-bold text-center mb-5">Latest Lottery Results</h1>
    <div id="display" class="grid gap-4 max-w-xl mx-auto"></div>

    <script>
        async function load() {
            // results.json පස්සට වෙලාව එකතු කරලා cache එක bypass කරනවා
            const res = await fetch('results.json?nocache=' + new Date().getTime());
            const data = await res.json();
            const div = document.getElementById('display');
            
            if(data.length === 0) {
                div.innerHTML = "<p class='text-center'>No data yet. Please run Actions.</p>";
                return;
            }

            div.innerHTML = data.map(l => `
                <div class="bg-white p-4 rounded shadow">
                    <h2 class="font-bold text-lg">${l.name}</h2>
                    <p class="text-sm text-gray-400">${l.date}</p>
                    <div class="flex gap-2 mt-2">
                        ${l.numbers.map(n => `<span class="bg-blue-600 text-white w-8 h-8 flex items-center justify-center rounded-full font-bold">${n}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }
        load();
    </script>
    
    <div id="lottery-results">ප්‍රතිඵල ලෝඩ් වෙනවා...</div>

<script>
    // GitHub එකේ තියෙන ඔයාගේ JSON file එකේ link එක මෙතනට දාන්න
    const jsonUrl = 'https://github.com/hirushasandeeptha2006-ai/my-lottery-tool/blob/main/results.json';

    fetch(jsonUrl)
        .then(response => response.json())
        .then(data => {
            let html = '<h3>Last Updated: ' + data.last_updated + '</h3><ul>';
            data.lotteries.forEach(lot => {
                html += `<li><strong>${lot.name}:</strong> ${lot.letter} - ${lot.numbers}</li>`;
            });
            html += '</ul>';
            document.getElementById('lottery-results').innerHTML = html;
        })
        .catch(err => console.error('Error fetching results:', err));
</script>
</body>
</html>
