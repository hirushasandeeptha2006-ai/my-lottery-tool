name: Daily Lottery Update

on:
  schedule:
    - cron: '30 15 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3 # v2 වෙනුවට v3 දාන්න

      - name: Set up Python
        uses: actions/setup-python@v4 # v2 වෙනුවට v4 දාන්න
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add results.json
          git commit -m "Daily lottery results update" || exit 0
          git push
          name: Ultimate Lottery Scraper

on:
  schedule:
    - cron: '0 16 * * *' # ලංකාවේ වෙලාවෙන් රෑ 9:30 ට
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write # මේක තමයි රහස!
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Scraper
        run: python scraper.py

      - name: Commit Results
        run: |
          git config --global user.name 'LotteryBot'
          git config --global user.email 'bot@lottery.com'
          git add results.json
          git commit -m "Auto Update: $(date)" || exit 0
          git push
